<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="background-container"></div>
        <div id="overlay"></div>
        <div id="enter-overlay">
            <div class="enter-text">Click to Enter</div>
        </div>
        <main class="card glass">
            <div id="loading">
                <div class="spinner"></div>
            </div>
            <div id="profile" class="hidden">
                <div class="avatar-container">
                    <img id="avatar"
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                        alt="Profile Picture">
                    <div id="status-indicator" class="status-indicator offline" title="Offline"></div>
                </div>
                <h1 id="username">User</h1>
                <!-- <h2 id="bio">test</h2> -->
                <div id="badges"></div>
                <div class="status-text-container">
                    <p id="custom-status" class="status-text"></p>
                    <div id="activity" class="activity-container hidden">
                        <div class="activity-icon-wrapper">
                            <img id="activity-icon" src="" alt="">
                        </div>
                        <div class="activity-details">
                            <strong id="activity-name"></strong>
                            <span id="activity-state"></span>
                            <span id="activity-details-text"></span>
                        </div>
                    </div>
                </div>
                <div id="socials" class="social-links"></div>
            </div>
        </main>

        <div id="audio-control" class="audio-control hidden">
            <button id="play-pause-btn" aria-label="Play Music">
                <i class="fas fa-play"></i>
            </button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" aria-label="Volume">
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
